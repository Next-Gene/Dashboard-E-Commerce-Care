<!-- Add Button -->


<!-- Categories Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-3 gap-6 p-4 max-w-[1200px] mx-auto">
@for (category of Categories; track category.id) {
    <div class="relative group bg-white rounded-lg shadow-md overflow-hidden w-64 h-28 mx-auto cursor-pointer transition-all duration-300">
      <img [src]="category.photoUrl" [alt]="category.name" class="w-1/2 h-full object-cover float-left" />
      <div class="w-2/3 p-2 flex flex-col justify-center text-center float-right">
        <h3
          class="text-[11px] md:text-xs font-bold text-[#0070CD] text-center dark:text-white transition-colors duration-300"
        >
          {{ category.name }}
        </h3>
        <p
          class="text-[#00366A] text-[7px] md:text-[10px] font-semibold text-center leading-tight dark:text-white transition-colors duration-300"
        >
          {{ category.description }}
        </p>
      </div>

      <!-- Hover Buttons -->
      <div class="absolute inset-0 bg-blue-400 bg-opacity-80 flex justify-center items-center gap-4 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
        
        <!-- Edit Button with EXACT pencil icon from your image -->
        <button 
          (click)="onUpdateCategory(category); $event.stopPropagation()"
          class="p-2  hover:bg-blue-200 rounded-full text-white transition-colors duration-200"
          aria-label="Edit category"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
          </svg>
        </button>
        
        <!-- Delete Button with EXACT trash can icon from your image -->
        <button 
          (click)="onDeleteCategory(category); $event.stopPropagation()"
          class="p-2  hover:bg-red-400 rounded-full text-white transition-colors duration-200"
          aria-label="Delete category"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </button>
  
      </div>
    </div>
  }
</div>

<!-- Add Modal -->


<!-- Update Modal -->
@if (showUpdateModal) {
  <div class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50">
    <div class="bg-white rounded-xl p-6 w-[90%] max-w-md">
      <h2 class="text-xl font-semibold mb-4">Update Category</h2>
      <form [formGroup]="updateForm" (ngSubmit)="submitUpdate()">
        <input formControlName="name" placeholder="Name" class="w-full mb-3 p-2 border rounded" />
        <input formControlName="description" placeholder="Description" class="w-full mb-3 p-2 border rounded" />
        <div class="flex justify-end gap-2">
          <button type="button" (click)="closeModals()" class="bg-gray-400 text-white px-4 py-1 rounded">Cancel</button>
          <button type="submit" class="bg-yellow-500 text-white px-4 py-1 rounded">Update</button>
        </div>
      </form>
    </div>
  </div>
}

<!-- Delete Confirmation Modal -->
@if (showDeleteModal) {
  <div class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50">
    <div class="bg-white rounded-xl p-6 w-[90%] max-w-md text-center">
      <p class="text-lg font-semibold mb-4">Are you sure you want to delete this category?</p>
      <div class="flex justify-center gap-4">
        <button (click)="confirmDelete()" class="bg-red-500 text-white px-4 py-1 rounded">Yes</button>
        <button (click)="closeModals()" class="bg-gray-400 text-white px-4 py-1 rounded">No</button>
      </div>
    </div>
  </div>
}
