<div class="overflow-x-auto p-4">
  <table class="min-w-full table-auto border-separate border-spacing-y-3">
    <thead>
      <tr class="text-left  text-sm font-semibold text-gray-700">
        <th >Products</th>
        <th class="pl-5">Price</th>
        <th class="pl-5">State</th>
        <th>Amount</th>
        <th class="pl-10">Procedures</th>
      </tr>
    </thead>
    <tbody>
      <tr
        *ngFor="let product of products"
        class="bg-white rounded-xl shadow-sm overflow-hidden"
      >
        <!-- Products: Image + Name -->
        <td class="flex items-center gap-3 p-4">
          <img
            [src]="product.photoUrl"
            alt="product"
            class="w-10 h-14 object-contain rounded-md border"
          />
          <span class="text-sm font-medium text-gray-800">{{ product.name }}</span>
        </td>

        <!-- Price -->
        <td class="text-sm text-gray-700 p-4 whitespace-nowrap">
          {{ product.price }} EGP
        </td>

        <!-- State -->
        <td class="text-sm text-gray-700 p-4 capitalize">
         available
        </td>

        <!-- Amount -->
        <td class="text-sm text-gray-700 p-4">
          10 
        </td>

        <!-- Procedures -->
    <td class="p-4">
  <div class="flex gap-2">
    <button
      class="border border-blue-500 text-blue-500 px-4 py-1 rounded-md text-sm hover:bg-blue-50 transition"
    >
      Edit
    </button>
   
    
<button (click)="openDeleteModal(product.id)" data-modal-target="popup-modal" data-modal-toggle="popup-modal" class="block bg-blue-100 text-blue-700 px-4 py-1 rounded-md text-sm hover:bg-red-100 hover:text-red-500 transition" type="button">
delete</button>

<div id="popup-modal" tabindex="-1" class="hidden fixed inset-0 z-50 flex justify-center items-center bg-black bg-opacity-50">
    <div class="relative p-4 w-full max-w-md max-h-full">
        <div class="relative bg-white rounded-lg shadow-sm dark:bg-gray-700">
            <button (click)="closeModal()" type="button" class="absolute top-3 end-2.5 text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white" >
                <svg  class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                </svg>
                <span (click)="closeModal()" class="sr-only">Close modal</span>
            </button>
            <div class="p-4 md:p-5 text-center">
                <svg class="mx-auto mb-4 text-gray-400 w-12 h-12 dark:text-gray-200" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 11V6m0 8h.01M19 10a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
                </svg>
                <h3 class="mb-5 text-lg font-normal text-gray-500 dark:text-gray-400">Are you sure you want to delete this product?</h3>
                <button (click)="confirmDelete()"  type="button" class="text-white bg-red-600 hover:bg-red-800 focus:ring-4 focus:outline-none focus:ring-red-300 dark:focus:ring-red-800 font-medium rounded-lg text-sm inline-flex items-center px-5 py-2.5 text-center">
                    Yes, I'm sure
                </button>
                <button (click)="closeModal()" type="button" class="py-2.5 px-5 ms-3 text-sm font-medium text-gray-900 focus:outline-none bg-white rounded-lg border border-gray-200 hover:bg-gray-100 hover:text-blue-700 focus:z-10 focus:ring-4 focus:ring-gray-100 dark:focus:ring-gray-700 dark:bg-gray-800 dark:text-gray-400 dark:border-gray-600 dark:hover:text-white dark:hover:bg-gray-700">No, cancel</button>
            </div>
        </div>
    </div>
</div>

  </div>
</td>
      </tr>
    </tbody>
  </table>
</div>
