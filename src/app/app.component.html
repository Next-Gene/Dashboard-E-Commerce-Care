<div class="app-container">
  @if (!isAuthPage) {
    <div class="main-content" [class.mobile-view]="isMobileView">
      @if (!isMobileView) {
        <app-sidebar></app-sidebar>
      }
      <div class="content-area">
        <router-outlet></router-outlet>
      </div>
    </div>
    <app-mobile-nav *ngIf="isMobileView"></app-mobile-nav>
  } @else {
    <div class="auth-container">
      <router-outlet></router-outlet>
    </div>
  }
</div>
