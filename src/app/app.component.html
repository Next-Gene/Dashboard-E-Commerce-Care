<ng-container *ngIf="initialized; else initialLoading">
  <div class="app-container relative">
    <app-loading *ngIf="isLoading"></app-loading>

    <!-- Non-auth pages -->
    <ng-container *ngIf="!isAuthPage; else authLayout">
      <div class="main-layout" [class.mobile-view]="isMobileView">
        <app-sidebar *ngIf="!isMobileView"></app-sidebar>
        <main class="main-content">
          <router-outlet></router-outlet>
        </main>
      </div>
      <nav class="mobile-nav" *ngIf="isMobileView">
        <app-mobile-nav></app-mobile-nav>
      </nav>
    </ng-container>

    <!-- Auth pages -->
    <ng-template #authLayout>
      <div class="auth-layout">
        <router-outlet></router-outlet>
      </div>
    </ng-template>
  </div>
</ng-container>

<ng-template #initialLoading>
  <div class="full-page-loading">
    <app-loading></app-loading>
  </div>
</ng-template>
