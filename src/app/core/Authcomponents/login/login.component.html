<!-- Login Form Section -->
<div class="min-h-screen flex flex-col justify-center items-center w-full  p-4">
  <!-- Logo -->
  <div class="w-full max-w-md p-8 dark:bg-[#313131] bg-white rounded-2xl shadow-lg transform transition-all hover:scale-105 duration-300">
    <img class="w-64 mx-auto mb-8 cursor-pointer" routerLink="/home" src="/prime care.png" alt="Prime Care Logo">
    <h2 class="text-center text-3xl dark:text-white duration-300 transition-colors font-semibold mb-8 text-[#40568E] tracking-wide">SELLER CENTER</h2>

    <!-- Login Form -->
    <form [formGroup]="login" (ngSubmit)="Login()" class="space-y-6">
      <!-- Email Field -->
      @if (step==1) {
      <div class="space-y-4">
        <h3 class="text-xl font-medium text-gray-700 dark:text-white duration-300 transition-colors mb-6">SIGN IN</h3>
        <div class="space-y-2">
          <label class="text-sm font-medium dark:text-white duration-300 transition-colors text-gray-700">Enter Email</label>
          <input formControlName="email" type="email"
            class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-400 focus:border-transparent transition duration-200 bg-gray-50"
            aria-label="Email Address">
          <app-alerts [formName]="login" controlName="email" />
        </div>

        <button class="w-full bg-[#40568E] text-white py-3 rounded-lg hover:bg-[#2c3d6a] transform hover:scale-[1.02] transition-all duration-300 font-medium">
          Continue
        </button>

        <p class="text-sm dark:text-gray-300 duration-300 transition-colors text-gray-600 mt-6">
          By continuing, you agree to <span class="text-[#0070CD] hover:underline cursor-pointer">Prime's</span> Conditions
          of Use and <span class="text-[#0070CD] hover:underline cursor-pointer">Privacy Notice</span>
        </p>
      </div>
      }

      @if (step==2) {
      <!-- Password Field -->
      <div class="space-y-4">
        <div class="flex justify-between items-center">
          <label class="text-sm font-medium dark:text-white duration-300 transition-colors text-gray-700">Password</label>
          <a routerLink="/resetPassword" class="text-[#0070CD] text-sm hover:underline">
            Forgot Password?
          </a>
        </div>
        <input formControlName="password" type="password"
          class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-400 focus:border-transparent transition duration-200 bg-gray-50"
          aria-label="Password">
        <app-alerts [formName]="login" controlName="password" />

        <!-- Error Message -->
        <p class="text-center text-red-600">{{errormessage}}</p>

        <button class="w-full bg-[#40568E] text-white py-3 rounded-lg hover:bg-[#2c3d6a] transform hover:scale-[1.02] transition-all duration-300 font-medium">
          Sign In
        </button>
      </div>
      }
    </form>
  </div>
</div>
