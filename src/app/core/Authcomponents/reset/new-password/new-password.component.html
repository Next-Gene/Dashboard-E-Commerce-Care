<div class="min-h-screen flex flex-col justify-center items-center w-full bg-gradient-to-br dark:bg-[#292929] duration-300 transition-colors p-4">
  <div class="w-full max-w-md p-8 dark:bg-[#313131] bg-white rounded-2xl shadow-lg transform transition-all hover:scale-105 duration-300">
    <!-- Logo -->
    <img class="w-64 mx-auto mb-8" src="/prime care.png" alt="prime care">
    <h2 class="text-center text-3xl dark:text-white duration-300 transition-colors font-semibold mb-8 text-[#40568E] tracking-wide">SELLER CENTER</h2>

    <!-- Password Reset Form -->
    <form [formGroup]="resetpass" (ngSubmit)="submit3()" class="space-y-6">
      <h3 class="text-xl font-medium dark:text-white duration-300 transition-colors text-gray-700 text-center mb-6">New Password</h3>

      <div class="space-y-4">
        <!-- Email Field -->
        <div class="space-y-2">
          <label class="text-sm dark:text-gray-300 duration-300 transition-colors font-medium text-gray-700">Email</label>
          <input formControlName="email" type="email" aria-label="Email Address"
            class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-400 focus:border-transparent transition duration-200 bg-gray-50">
          <app-alerts [formName]="resetpass" controlName="email" />
        </div>

        <!-- New Password Field -->
        <div class="space-y-2">
          <label class="text-sm font-medium dark:text-gray-300 duration-300 transition-colors text-gray-700">New Password</label>
          <input formControlName="password" type="password" aria-label="New Password"
            class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-400 focus:border-transparent transition duration-200 bg-gray-50">
          <app-alerts [formName]="resetpass" controlName="password" />
        </div>

        <!-- Confirm Password Field -->
        <div class="space-y-2">
          <label class="text-sm font-medium dark:text-gray-300 duration-300 transition-colors text-gray-700">Confirm Password</label>
          <input formControlName="confirmPassword" type="password" aria-label="Confirm Password"
            class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-400 focus:border-transparent transition duration-200 bg-gray-50">
          <app-alerts [formName]="resetpass" controlName="confirmPassword" />
        </div>
      </div>

      <!-- Submit Button -->
      <button class="w-full bg-[#40568E] text-white py-3 rounded-lg hover:bg-[#2c3d6a] transform hover:scale-[1.02] transition-all duration-300 font-medium">
        SUBMIT
      </button>
    </form>

    <!-- Back to Login Link -->
    <div class="mt-8 text-center">
      <a routerLink="/login" class="text-[#0070CD] hover:underline inline-flex items-center">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        Back to Login
      </a>
    </div>
  </div>
</div>
