<div class="flex flex-col dark:bg-[#252525] justify-center items-center min-h-screen w-full px-4 sm:px-8 lg:px-16">
  <!-- Logo -->
  <img class="w-48 sm:w-60" src="images/logo 2 trams.png" alt="Password Reset Logo">

  <!-- Title -->
  <div class="text-center mt-10">
    <h1 class="text-xl font-semibold dark:text-white text-[#00366A]">
      Reset Your Password
    </h1>
  </div>

  <!-- Password Reset Form -->
  <form [formGroup]="resetpass" (ngSubmit)="submit3()" class="w-full max-w-xs sm:max-w-sm mt-6">
    <!-- Email Field -->
    <app-email-input>
      <i class="fas fa-envelope text-gray-500 absolute left-3 top-1/2 transform -translate-y-1/2"></i>
      <input formControlName="email" type="email" placeholder="Email Address" aria-label="Email Address"
        class="dark:bg-gray-200 border border-blue-300 text-sm rounded-lg focus:ring-blue-500 text-blue-800 placeholder-blue-900 focus:border-blue-500 block w-full pl-10 p-2.5">
    </app-email-input>
    <app-alerts [formName]="resetpass" controlName="email" />

    <!-- New Password Field -->
    <app-email-input class="mt-4">
      <i class="fas fa-lock text-gray-500 absolute left-3 top-1/2 transform -translate-y-1/2"></i>
      <input formControlName="password" type="password" placeholder="New Password" aria-label="New Password"
        class="dark:bg-gray-200 border border-blue-300 text-sm rounded-lg focus:ring-blue-500 text-blue-800 placeholder-blue-900 focus:border-blue-500 block w-full pl-10 p-2.5">
    </app-email-input>
    <app-alerts [formName]="resetpass" controlName="password" />

    <!-- Confirm Password Field -->
    <app-email-input class="mt-4">
      <i class="fas fa-lock text-gray-500 absolute left-3 top-1/2 transform -translate-y-1/2"></i>
      <input formControlName="confirmPassword" type="password" placeholder="Confirm Password"
        aria-label="Confirm Password"
        class="dark:bg-gray-300 border border-blue-300 text-sm rounded-lg focus:ring-blue-500 text-blue-800 placeholder-blue-900 focus:border-blue-500 block w-full pl-10 p-2.5">
    </app-email-input>
    <app-alerts [formName]="resetpass" controlName="confirmPassword" />

    <!-- Submit Button -->
    <div class="text-center mt-6">
      <button class="bg-blue-900 text-white hover:bg-blue-700 duration-500 text-center rounded-3xl px-12 p-4 text-xl">
        SUBMIT
      </button>
    </div>
  </form>

  <!-- Back to Login Link -->
  <div class="mt-6 text-center">
    <a routerLink="/login" class="text-blue-600 hover:underline">
      ← Back to Login
    </a>
  </div>
</div>
