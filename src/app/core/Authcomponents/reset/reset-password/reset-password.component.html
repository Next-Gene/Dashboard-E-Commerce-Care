<div class="min-h-screen flex flex-col justify-center items-center dark:bg-[#292929] w-full bg-gradient-to-br  p-4">
  <div class="w-full max-w-md p-8 bg-white dark:bg-[#313131] rounded-2xl shadow-lg transform transition-all hover:scale-105 duration-300">
    <!-- Logo -->
    <img class="w-64 mx-auto mb-8" src="/prime care.png" alt="Forgot Password Logo">
    <h2 class="text-center text-3xl dark:text-white duration-300 transition-colors font-semibold mb-8 text-[#40568E] tracking-wide">SELLER CENTER</h2>

    <!-- Form -->
    <form [formGroup]="forgetpass" (ngSubmit)="submit()" class="space-y-6">
      <div class="space-y-4">
        <h3 class="text-xl font-medium dark:text-white duration-300 transition-colors text-gray-700 mb-2">Password Assistant</h3>
        <p class="text-sm text-gray-600 mb-6 dark:text-gray-300 duration-300 transition-colors">Enter your email address to receive a verification code.</p>

        <!-- Email Field -->
        <div class="space-y-2">
          <label class="text-sm font-medium text-gray-700 dark:text-gray-300 duration-300 transition-colors">Enter Email</label>
          <input formControlName="email" type="email" aria-label="Email Address"
            class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-400 focus:border-transparent transition duration-200 bg-gray-50">
          
          <!-- Validation Alerts -->
          <app-alerts [formName]="forgetpass" controlName="email"/>
        </div>

        <!-- Submit Button -->
        <button class="w-full bg-[#40568E] text-white py-3 rounded-lg hover:bg-[#2c3d6a] transform hover:scale-[1.02] transition-all duration-300 font-medium">
          Send Code
        </button>
      </div>
    </form>

    <!-- Back to Login Link -->
    <div class="mt-8 text-center">
      <a routerLink="/login" class="text-[#0070CD] hover:underline inline-flex items-center justify-center">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        Back to Login
      </a>
    </div>
  </div>
</div>
