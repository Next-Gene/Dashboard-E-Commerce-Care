<div class="flex flex-col dark:bg-[#252525] justify-center items-center min-h-screen w-full px-4 sm:px-8 lg:px-16">
  <!-- Logo -->
  <img class="w-32 sm:w-48" 
       src="images/logo 2 trams.png" 
       alt="Forgot Password Logo">
  
  <!-- Title -->
  <h1 class="text-2xl font-semibold mt-10 text-center dark:text-white text-[#00366A]">
    Forgot Password
  </h1>
  
  <!-- Instructions -->
  <p class="text-lg mt-4 text-center text-[#757F95]">
    Please enter your email address to reset your password.
  </p>
    
  <!-- Form -->
  <form [formGroup]="forgetpass" (ngSubmit)="submit()" class="w-full max-w-xs sm:max-w-sm mt-6">
    <!-- Email Field -->
    <div class="relative w-full">
      <i class="fas fa-envelope text-gray-500 absolute left-3 top-1/2 transform -translate-y-1/2"></i>
      <input 
        formControlName="email" 
        type="email" 
        placeholder="Email Address"
        aria-label="Email Address"
        class="w-full border border-blue-300 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 pl-10 p-2.5 placeholder-blue-900 text-blue-700 dark:bg-gray-200">
    </div>
    
    <!-- Validation Alerts -->
    <app-alerts [formName]="forgetpass" controlName="email"/>
    
    <!-- Submit Button -->
     <div class="text-center mt-6">
<button
  class="bg-blue-900 text-white hover:bg-blue-700 duration-500 text-center rounded-3xl px-12 p-4 text-xl"
>
SUBMIT
</button>   
   </div>
  </form>
  
  <!-- Back to Login Link -->
  <div class="mt-6 text-center">
    <a routerLink="/login" class="text-blue-600 hover:underline">
      ← Back to Login
    </a>
  </div>
</div>
