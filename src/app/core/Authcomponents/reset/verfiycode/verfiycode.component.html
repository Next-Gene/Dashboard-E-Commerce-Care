<div class="flex flex-col dark:bg-[#252525] justify-center items-center min-h-screen w-full px-4 sm:px-8 lg:px-16">
  <!-- Logo -->
  <img class="w-44 sm:w-52" 
       src="images/logo 2 trams.png" 
       alt="Verification Logo">
  
  <!-- Title and Instructions -->
  <div class="text-center mt-5">
    <h1 class="text-xl dark:text-white font-semibold text-[#00366A]">
      Verification Code
    </h1>
    <p class="text-lg mt-4 dark:text-white text-[#757F95]">
      Please enter the 6-digit code sent to your email.
    </p>
    <p class="text-lg mt-2 dark:text-white text-gray-600">
      example&#64;email.com
    </p>
  </div>

  <!-- Verification Form -->
  <form [formGroup]="verifycode" (ngSubmit)="submit2()" class="w-full max-w-xs sm:max-w-sm ">
      <div class="relative w-full my-4">
        <i class="fas fa-envelope text-gray-500 absolute left-3 top-1/2 transform -translate-y-1/2"></i>
        <input formControlName="email" 
               type="email" 
               placeholder="Email Address"
               class="w-full border border-blue-300 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 pl-10 p-2.5 placeholder-blue-900 text-blue-700 dark:bg-gray-300"
               aria-label="Email Address">
      </div>
      <app-alerts [formName]="verifycode" controlName="email"/>
      
    <!-- Code Input Fields -->
    <div class="flex justify-center space-x-3">
      <input 
        formControlName="digit1" 
        id="digit1" 
        type="text" 
        maxlength="1" 
        (input)="onInput($event, 'digit2')" 
        (paste)="onPaste($event)"
        aria-label="Digit 1"
        class="w-11 h-11 text-lg font-bold text-center border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-300 dark:border-gray-600 text-blue-700">

      <input 
        formControlName="digit2" 
        id="digit2" 
        type="text" 
        maxlength="1" 
        (input)="onInput($event, 'digit3', 'digit1')" 
        (paste)="onPaste($event)"
        aria-label="Digit 2"
        class="w-11 h-11 text-lg font-bold text-center border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-300 dark:border-gray-600 text-blue-700">

      <input 
        formControlName="digit3" 
        id="digit3" 
        type="text" 
        maxlength="1" 
        (input)="onInput($event, 'digit4', 'digit2')" 
        (paste)="onPaste($event)"
        aria-label="Digit 3"
        class="w-11 h-11 text-lg font-bold text-center border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-300 dark:border-gray-600 text-blue-700">

      <input 
        formControlName="digit4" 
        id="digit4" 
        type="text" 
        maxlength="1" 
        (input)="onInput($event, 'digit5', 'digit3')" 
        (paste)="onPaste($event)"
        aria-label="Digit 4"
        class="w-11 h-11 text-lg font-bold text-center border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-200 dark:border-gray-600 text-blue-700">

      <input 
        formControlName="digit5" 
        id="digit5" 
        type="text" 
        maxlength="1" 
        (input)="onInput($event, 'digit6', 'digit4')" 
        (paste)="onPaste($event)"
        aria-label="Digit 5"
        class="w-11 h-11 text-lg font-bold text-center border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-200 dark:border-gray-600 text-blue-700">

      <input 
        formControlName="digit6" 
        id="digit6" 
        type="text" 
        maxlength="1" 
        (input)="onInput($event, undefined, 'digit5')" 
        (paste)="onPaste($event)"
        aria-label="Digit 6"
        class="w-11 h-11 text-lg font-bold text-center border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-300 dark:border-gray-600 text-blue-700">
    </div>

    <!-- Verify Button -->
 <div class="text-center mt-6">
<button
  class="bg-blue-900 text-white hover:bg-blue-700 duration-500 text-center rounded-3xl px-12 p-4 text-xl"
>
SUBMIT
</button>   
   </div>

    <!-- Resend Code Option -->
    <!-- <div class="text-center mt-4">
      <button type="button" 
              (click)="resendCode()"
              class="text-blue-600 hover:text-blue-800 hover:underline"
              [disabled]="resendDisabled">
        Resend Code
      </button>
    </div> -->
  </form>
</div>
