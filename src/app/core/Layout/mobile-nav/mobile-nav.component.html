<ng-container *ngIf="isAdmin">
  <nav class="mobile-nav" [class.dark]="isDarkMode">
    <!-- Floating Dashboard Button -->
    <div class="preview-btn-container">
      <button
        class="preview-btn"
        routerLink="/admin/dashboard"
        aria-label="Dashboard"
      >
        <i class="fas fa-chart-line"></i>
      </button>
    </div>

    <!-- Nav Items -->
    <a class="nav-item" routerLink="/admin/orders" routerLinkActive="active">
      <i class="fas fa-shopping-bag"></i>
      <span>Orders</span>
    </a>

    <a class="nav-item" routerLink="/admin/category" routerLinkActive="active">
      <i class="fas fa-th-list"></i>
      <span>Menu</span>
    </a>

    <a
      class="nav-item"
      routerLink="/admin/manage-products"
      routerLinkActive="active"
    >
      <i class="fas fa-box-open"></i>
      <span>Products</span>
    </a>

    <a
      class="nav-item"
      routerLink="/admin/manage-brands"
      routerLinkActive="active"
    >
      <i class="fas fa-building"></i>
      <span>Brands</span>
    </a>

    <a
      class="nav-item"
      routerLink="/admin/customer-review"
      routerLinkActive="active"
    >
      <i class="fas fa-comments"></i>
      <span>Reviews</span>
    </a>

    <div class="nav-item" (click)="toggleSettingsDropdown()">
      <i class="fas fa-cog"></i>
      <span>Settings</span>
    </div>

    <!-- Dropdown Menu -->
    <div
      class="settings-dropdown"
      *ngIf="isSettingsDropdownOpen"
      (click)="$event.stopPropagation()"
    >
      <button
        routerLink="/admin/user-role"
        class="dropdown-item"
      >
        <i class="fas fa-user mr-2"></i> Accounts
      </button>

      <div
        class="flex items-center justify-between px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-[#383838] transition-colors duration-300 cursor-pointer"
        role="menuitem"
      >
        <span class="flex items-center">
          <i class="fas fa-moon mr-2"></i>
          <span>Dark Mode</span>
        </span>

        <label class="switch cursor-pointer" (click)="$event.stopPropagation()">
          <input
            id="theme-toggle-input"
            type="checkbox"
            [checked]="isDarkMode"
            (change)="toggleTheme()"
          />
          <div class="slider round">
            <div class="sun-moon">
              <!-- Moon Dots -->
              <ng-container *ngFor="let i of [1, 2, 3]">
                <svg
                  [id]="'moon-dot-' + i"
                  class="moon-dot"
                  viewBox="0 0 100 100"
                >
                  <circle cx="50" cy="50" r="50"></circle>
                </svg>
              </ng-container>

              <!-- Clouds -->
              <ng-container *ngFor="let i of [1, 2, 3]">
                <svg
                  [id]="'cloud-' + i"
                  class="cloud-dark"
                  viewBox="0 0 100 100"
                >
                  <circle cx="50" cy="50" r="50"></circle>
                </svg>
              </ng-container>
              <ng-container *ngFor="let i of [4, 5, 6]">
                <svg
                  [id]="'cloud-' + i"
                  class="cloud-light"
                  viewBox="0 0 100 100"
                >
                  <circle cx="50" cy="50" r="50"></circle>
                </svg>
              </ng-container>
            </div>

            <!-- Stars -->
            <div class="stars">
              <ng-container *ngFor="let i of [1, 2, 3, 4]">
                <svg [id]="'star-' + i" class="star" viewBox="0 0 20 20">
                  <path
                    d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"
                  ></path>
                </svg>
              </ng-container>
            </div>
          </div>
        </label>
      </div>

      <button class="dropdown-item logout" (click)="logout()">
        <i class="fas fa-sign-out-alt mr-2"></i> Logout
      </button>
    </div>
  </nav>
</ng-container>
