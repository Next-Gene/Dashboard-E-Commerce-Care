<div class="flex h-screen bg-gray-100">
  <!-- Sidebar -->
  <aside [class]="isSidebarOpen ? 'w-64' : 'w-20'" 
         class="bg-white transition-all duration-300 shadow-lg">
    <!-- Profile Section -->
    <div class="p-4 border-b">
      <div class="flex items-center space-x-4">
        <img src="/seif.jpg" alt="Profile" 
             class="w-10 h-10 rounded-full">
        <div [class]="isSidebarOpen ? 'block' : 'hidden'">
          <h3 class="text-sm font-semibold text-gray-700">Seif Emam</h3>
          <span class="text-xs text-green-500">Online</span>
        </div>
      </div>
    </div>

    <!-- Navigation Menu -->
    <nav class="mt-4">
      <div class="px-4 py-2 text-xs font-semibold text-gray-400 uppercase" 
           [class.text-center]="!isSidebarOpen">
        MENU
      </div>

      <!-- Menu Items -->
      <div class="space-y-1">
        <!-- Dashboard -->
        <a routerLink="/dashboard" 
           routerLinkActive="bg-blue-50 text-blue-600 border-r-4 border-blue-600"
           class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                  d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          <span [class]="isSidebarOpen ? 'ml-3' : 'hidden'">Dashboard</span>
        </a>

        <!-- Orders -->
        <a routerLink="/orders" 
           routerLinkActive="bg-blue-50 text-blue-600 border-r-4 border-blue-600"
           class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                  d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
          </svg>
          <span [class]="isSidebarOpen ? 'ml-3' : 'hidden'">Orders</span>
        </a>

        <!-- Manage Menu -->
        <a routerLink="/category" 
           routerLinkActive="bg-blue-50 text-blue-600 border-r-4 border-blue-600"
           class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                  d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/>
          </svg>
          <span [class]="isSidebarOpen ? 'ml-3' : 'hidden'">Manage Category</span> 

        </a>

        <!-- Customer Review -->
        <a routerLink="/reviews" 
           routerLinkActive="bg-blue-50 text-blue-600 border-r-4 border-blue-600"
           class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                  d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
          </svg>
          <span [class]="isSidebarOpen ? 'ml-3' : 'hidden'">Customer Review</span>
        </a>
      </div>

      <!-- Others Section -->
      <div class="px-4 py-2 mt-8 text-xs font-semibold text-gray-400 uppercase"
           [class.text-center]="!isSidebarOpen">
        OTHERS
      </div>

      <div class="space-y-1">
        <!-- Settings -->
        <a routerLink="/settings" 
           routerLinkActive="bg-blue-50 text-blue-600 border-r-4 border-blue-600"
           class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                  d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          <span [class]="isSidebarOpen ? 'ml-3' : 'hidden'">Settings</span>
        </a>

        <!-- Payment -->
        <a routerLink="/payment" 
           routerLinkActive="bg-blue-50 text-blue-600 border-r-4 border-blue-600"
           class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                  d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
          </svg>
          <span [class]="isSidebarOpen ? 'ml-3' : 'hidden'">Payment</span>
        </a>

        <!-- Accounts -->
        <a routerLink="/accounts" 
           routerLinkActive="bg-blue-50 text-blue-600 border-r-4 border-blue-600"
           class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                  d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          <span [class]="isSidebarOpen ? 'ml-3' : 'hidden'">Accounts</span>
        </a>

        <!-- Help -->
        <a routerLink="/help" 
           routerLinkActive="bg-blue-50 text-blue-600 border-r-4 border-blue-600"
           class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                  d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span [class]="isSidebarOpen ? 'ml-3' : 'hidden'">Help</span>
        </a>
      </div>
    </nav>

    <!-- Toggle Button -->
    <button (click)="toggleSidebar()" 
            class="absolute -right-3 top-10 bg-white rounded-full p-1.5 shadow-lg border">
      <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path *ngIf="isSidebarOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
              d="M15 19l-7-7 7-7"/>
        <path *ngIf="!isSidebarOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
              d="M9 5l7 7-7 7"/>
      </svg>
    </button>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100">
    <router-outlet></router-outlet>
  </main>
</div>
