<div class="flex h-screen bg-gray-100">
  <!-- Sidebar -->
  <aside class="fixed top-0 left-0 z-40 w-64 h-screen transition-transform -translate-x-full sm:translate-x-0" aria-label="Sidebar">
    <div class="h-full px-3 py-4 overflow-y-auto bg-white border-r border-gray-200">
      <!-- Logo -->
      <div class="flex items-center justify-center mb-8">
        <img src="/prime care.png" alt="Logo" class="h-12">
      </div>

      <!-- User Profile -->
      <div class="flex items-center mb-6 p-2 rounded-lg bg-gray-50">
        <div class="flex-shrink-0">
          <i class="fa-solid fa-circle-user text-3xl"></i>
        </div>
        <div class="flex-1 min-w-0 ms-4">
          <p class="text-sm font-medium text-gray-900 truncate">
            {{ userName }}
          </p>
          
        </div>
      </div>

      <!-- Navigation -->
      <ul class="space-y-2 font-medium">
        <!-- Admin Menu -->
        @if (isAdmin) {
          <li>
            <a routerLink="/admin/dashboard" routerLinkActive="bg-gray-100" class="flex items-center p-2 text-gray-900 rounded-lg hover:bg-gray-100 group">
              <i class="fas fa-chart-line w-5 h-5 text-gray-500 transition duration-75 group-hover:text-gray-900"></i>
              <span class="ms-3">Dashboard</span>
            </a>
          </li>
          <li>
            <a routerLink="/home" routerLinkActive="bg-gray-100" class="flex items-center p-2 text-gray-900 rounded-lg hover:bg-gray-100 group">
              <i class="fas fa-users w-5 h-5 text-gray-500 transition duration-75 group-hover:text-gray-900"></i>
              <span class="ms-3">Home</span>
            </a>
          </li>
          <li>
            <a routerLink="" routerLinkActive="bg-gray-100" class="flex items-center p-2 text-gray-900 rounded-lg hover:bg-gray-100 group">
              <i class="fas fa-box w-5 h-5 text-gray-500 transition duration-75 group-hover:text-gray-900"></i>
              <span class="ms-3">Products</span>
            </a>
          </li>
          <li>
            <a routerLink="" routerLinkActive="bg-blue-100" class="flex items-center p-2 text-gray-900 rounded-lg hover:bg-gray-100 group">
              <i class="fas fa-shopping-cart w-5 h-5 text-gray-500 transition duration-75 group-hover:text-gray-900"></i>
              <span class="ms-3">Orders</span>
            </a>
          </li>
        }

        <!-- Seller Menu -->
        @if (isSeller) {
          <li>
            <a routerLink="/seller/dashboard" routerLinkActive="bg-gray-100" class="flex items-center p-2 text-gray-900 rounded-lg hover:bg-gray-100 group">
              <i class="fas fa-chart-line w-5 h-5 text-gray-500 transition duration-75 group-hover:text-gray-900"></i>
              <span class="ms-3">Dashboard</span>
            </a>
          </li>
          <li>
            <a routerLink="/seller/products" routerLinkActive="bg-gray-100" class="flex items-center p-2 text-gray-900 rounded-lg hover:bg-gray-100 group">
              <i class="fas fa-box w-5 h-5 text-gray-500 transition duration-75 group-hover:text-gray-900"></i>
              <span class="ms-3">Products</span>
            </a>
          </li>
          <li>
            <a routerLink="/seller/orders" routerLinkActive="bg-gray-100" class="flex items-center p-2 text-gray-900 rounded-lg hover:bg-gray-100 group">
              <i class="fas fa-shopping-cart w-5 h-5 text-gray-500 transition duration-75 group-hover:text-gray-900"></i>
              <span class="ms-3">Orders</span>
            </a>
          </li>
        }

        <!-- Common Menu Items -->
       
 
      </ul>
    </div>
  </aside>

</div>
