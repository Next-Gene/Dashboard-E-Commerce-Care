<div class="flex h-screen bg-gray-100">
  <!-- Sidebar -->
  <aside
    class="fixed top-0 left-0 z-40 w-64 h-screen transition-transform -translate-x-full sm:translate-x-0"
    aria-label="Sidebar"
  >
    <div
      class="h-full px-3 py-4 overflow-y-auto dark:bg-[#292929] duration-300 transition-colors bg-white border-r border-gray-200"
    >
      <!-- Logo -->
      <div
        class="flex items-center justify-center mb-4 cursor-pointer"
        routerLink="/"
      >
        <img src="/prime care.png" alt="Logo" class="h-16" />
      </div>

      <!-- User Profile -->
      <div class="flex flex-col items-center mb-6 p-2 rounded-lg">
        <!-- User Icon -->
        <div class="flex-shrink-0 mb-2">
          <i class="fa-solid fa-circle-user text-3xl text-gray-700"></i>
        </div>

        <!-- User Name -->
        <div class="text-center">
          <p class="text-sm font-medium text-gray-900 truncate">
            {{ getcurrentUser() }}
          </p>
        </div>
      </div>

      <!-- Navigation -->
      <ul
        class="menu-list dark:text-white duration-300 transition-colors dark:bg-[#292929]"
      >
        <ng-container *ngIf="isAdmin">
          <li class="section-title">MENU</li>
          <li>
            <a
              class="menu-item active"
              routerLinkActive="active"
              routerLink="/admin/dashboard"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-chart-line"></i>
              </span>
              <span>Dashboard</span>
            </a>
          </li>

          <li>
            <a
              class="menu-item"
              routerLinkActive="active"
              routerLink="/admin/orders"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-shopping-bag"></i>
                <!-- Orders icon -->
              </span>
              <span>Orders</span>
            </a>
          </li>

          <li>
            <a
              class="menu-item"
              routerLinkActive="active"
              routerLink="/admin/category"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-th-list"></i>
              </span>
              <span>Manage Menu</span>
            </a>
          </li>

          <li>
            <a
              class="menu-item"
              routerLinkActive="active"
              routerLink="/admin/manage-products"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-box-open"></i>
              </span>
              <span>Manage Products</span>
            </a>
          </li>

          <li>
            <a
              class="menu-item"
              routerLinkActive="active"
              routerLink="/admin/manage-brands"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-building"></i>
              </span>
              <span>Manage Brands</span>
            </a>
          </li>

          <li>
            <a
              class="menu-item"
              routerLinkActive="active"
              routerLink="/admin/customer-review"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-comments"></i>
                <!-- Customer Review icon -->
              </span>
              <span>Customer Review</span>
            </a>
          </li>
          <li class="section-title">OTHERS</li>
          <li class="relative">
            <button
              (click)="toggleSettingsDropdown()"
              class="menu-item w-full flex items-center justify-between"
            >
              <span class="flex items-center gap-3">
                <span class="icon-bg">
                  <i class="fas fa-cog"></i>
                </span>
                <span>Settings</span>
              </span>
              <i class="fas fa-chevron-down text-sm"></i>
            </button>

            <!-- Dropdown -->
            <ul
              *ngIf="isSettingsDropdownOpen"
              class="absolute left-0 mt-1 w-full bg-white border dark:bg-[#292929] duration-300 transition-colors border-gray-200 rounded-lg shadow-lg z-50"
            >
              <li>
                <button
                  class="w-full text-left px-4 py-2 dark:hover:text-black dark:text-white duration-300 transition-colors hover:bg-gray-100 text-[#160E4B] font-medium"
                  routerLink="/admin/user-role"
                >
                  <span class="icon-bg">
                    <i class="fas fa-user mr-2"></i>
                  </span>
                  <span>Accounts</span>
                </button>
              </li>
              <li>
                <div
                  class="flex items-center justify-between px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-[#383838] transition-colors duration-300 cursor-pointer"
                  role="menuitem"
                >
                  <span class="flex items-center">
                    <i class="fas fa-moon mr-2"></i>
                    <span>Dark Mode</span>
                  </span>
                  <label
                    class="switch cursor-pointer"
                    (click)="$event.stopPropagation()"
                  >
                    <input
                      id="theme-toggle-input"
                      type="checkbox"
                      [checked]="isdarkmode"
                      (change)="toggleTheme()"
                    />
                    <div class="slider round">
                      <div class="sun-moon">
                        <svg
                          *ngFor="let i of [1, 2, 3]"
                          [attr.id]="'moon-dot-' + i"
                          class="moon-dot"
                          viewBox="0 0 100 100"
                        >
                          <circle cx="50" cy="50" r="50"></circle>
                        </svg>
                        <svg
                          *ngFor="let i of [1, 2, 3]"
                          [attr.id]="'light-ray-' + i"
                          class="light-ray"
                          viewBox="0 0 100 100"
                        >
                          <circle cx="50" cy="50" r="50"></circle>
                        </svg>
                        <svg
                          *ngFor="let i of [1, 2, 3]"
                          [attr.id]="'cloud-' + i"
                          class="cloud-dark"
                          viewBox="0 0 100 100"
                        >
                          <circle cx="50" cy="50" r="50"></circle>
                        </svg>
                        <svg
                          *ngFor="let i of [4, 5, 6]"
                          [attr.id]="'cloud-' + i"
                          class="cloud-light"
                          viewBox="0 0 100 100"
                        >
                          <circle cx="50" cy="50" r="50"></circle>
                        </svg>
                      </div>
                      <div class="stars">
                        <svg
                          *ngFor="let i of [1, 2, 3, 4]"
                          [attr.id]="'star-' + i"
                          class="star"
                          viewBox="0 0 20 20"
                        >
                          <path
                            d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"
                          ></path>
                        </svg>
                      </div>
                    </div>
                  </label>
                </div>
              </li>
              <li>
                <button
                  class="w-full text-left px-4 py-2 hover:bg-red-100 text-red-600 font-semibold"
                  (click)="logout()"
                >
                  <i class="fas fa-sign-out-alt mr-2"></i>
                  Logout
                </button>
              </li>
            </ul>
          </li>
        </ng-container>

        <!-- Seller Menu -->
        <ng-container *ngIf="isSeller">
          <li class="section-title">MENU</li>
          <li>
            <a
              class="menu-item active"
              routerLinkActive="active"
              routerLink="/seller/dashboard"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-chart-line"></i>
                <!-- Dashboard icon -->
              </span>
              <span>Dashboard</span>
            </a>
          </li>

          <li>
            <a
              class="menu-item"
              routerLinkActive="active"
              routerLink="/seller/orders"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-shopping-bag"></i>
                <!-- Orders icon -->
              </span>
              <span>Orders</span>
            </a>
          </li>
          <li>
            <a
              class="menu-item"
              routerLinkActive="active"
              routerLink="/seller/manage-products"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-box-open"></i>
              </span>
              <span>Manage Products</span>
            </a>
          </li>

          <li>
            <a
              class="menu-item"
              routerLinkActive="active"
              routerLink="/seller/manage-brands"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-building"></i>
              </span>
              <span>Manage Brands</span>
            </a>
          </li>

          <li>
            <a
              class="menu-item"
              routerLinkActive="active"
              routerLink="/seller/customer-review"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-comments"></i>
                <!-- Customer Review icon -->
              </span>
              <span>Customer Review</span>
            </a>
          </li>
          <li class="section-title">OTHERS</li>
          <li class="relative">
            <button
              (click)="toggleSettingsDropdown()"
              class="menu-item w-full flex items-center justify-between"
            >
              <span class="flex items-center gap-3">
                <span class="icon-bg">
                  <i class="fas fa-cog"></i>
                </span>
                <span>Settings</span>
              </span>
              <i class="fas fa-chevron-down text-sm"></i>
            </button>

            <!-- Dropdown -->
            <ul
              *ngIf="isSettingsDropdownOpen"
              class="absolute left-0 mt-1 w-full bg-white border dark:bg-[#292929] duration-300 transition-colors border-gray-200 rounded-lg shadow-lg z-50"
            >
              <li>
                <div
                  class="flex items-center justify-between px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-[#383838] transition-colors duration-300 cursor-pointer"
                  role="menuitem"
                >
                  <span class="flex items-center">
                    <i class="fas fa-moon mr-2"></i>
                    <span>Change Mood</span>
                  </span>
                  <label
                    class="switch cursor-pointer"
                    (click)="$event.stopPropagation()"
                  >
                    <input
                      id="theme-toggle-input"
                      type="checkbox"
                      [checked]="isdarkmode"
                      (change)="toggleTheme()"
                    />
                    <div class="slider round">
                      <div class="sun-moon">
                        <svg
                          *ngFor="let i of [1, 2, 3]"
                          [attr.id]="'moon-dot-' + i"
                          class="moon-dot"
                          viewBox="0 0 100 100"
                        >
                          <circle cx="50" cy="50" r="50"></circle>
                        </svg>
                        <svg
                          *ngFor="let i of [1, 2, 3]"
                          [attr.id]="'light-ray-' + i"
                          class="light-ray"
                          viewBox="0 0 100 100"
                        >
                          <circle cx="50" cy="50" r="50"></circle>
                        </svg>
                        <svg
                          *ngFor="let i of [1, 2, 3]"
                          [attr.id]="'cloud-' + i"
                          class="cloud-dark"
                          viewBox="0 0 100 100"
                        >
                          <circle cx="50" cy="50" r="50"></circle>
                        </svg>
                        <svg
                          *ngFor="let i of [4, 5, 6]"
                          [attr.id]="'cloud-' + i"
                          class="cloud-light"
                          viewBox="0 0 100 100"
                        >
                          <circle cx="50" cy="50" r="50"></circle>
                        </svg>
                      </div>
                      <div class="stars">
                        <svg
                          *ngFor="let i of [1, 2, 3, 4]"
                          [attr.id]="'star-' + i"
                          class="star"
                          viewBox="0 0 20 20"
                        >
                          <path
                            d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"
                          ></path>
                        </svg>
                      </div>
                    </div>
                  </label>
                </div>
              </li>
              <li>
                <button
                  class="w-full text-left px-4 py-2 hover:bg-red-100 text-red-600 font-semibold"
                  (click)="logout()"
                >
                  <i class="fas fa-sign-out-alt mr-2"></i>
                  Logout
                </button>
              </li>
            </ul>
          </li>
        </ng-container>
      </ul>
    </div>
  </aside>
</div>
