<div class="flex h-screen bg-gray-100">
  <!-- Sidebar -->
  <aside
    class="fixed top-0 left-0 z-40 w-64 h-screen transition-transform -translate-x-full sm:translate-x-0"
    aria-label="Sidebar"
  >
    <div
      class="h-full px-3 py-4 overflow-y-auto dark:bg-[#292929] duration-300 transition-colors  bg-white border-r border-gray-200"
    >
      <!-- Logo -->
      <div
        class="flex items-center justify-center mb-4 cursor-pointer"
        routerLink="/"
      >
        <img src="/prime care.png" alt="Logo" class="h-16" />
      </div>

      <!-- User Profile -->
      <div class="flex items-center mb-6 p-2 rounded-lg dark:text-white duration-300 transition-colors dark:bg-[#292929] bg-gray-50">
        <div class="flex-shrink-0">
          <i class="fa-solid fa-circle-user text-3xl dark:text-white duration-300 transition-colors "></i>
        </div>
        <div class="flex-1 min-w-0 ms-4">
          <p class="text-sm font-medium dark:text-white duration-300 transition-colors  text-gray-900 truncate">
            {{ userName }}
          </p>
        </div>
      </div>

      <!-- Navigation -->
      <ul class="menu-list dark:text-white duration-300 transition-colors dark:bg-[#292929]">
        <ng-container *ngIf="isAdmin">
          <li class="section-title ">MENU</li>
          <li>
            <a
              class="menu-item active"
              routerLinkActive="active"
              routerLink="/admin/dashboard"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-chart-line"></i>
              </span>
              <span>Dashboard</span>
            </a>
          </li>

          <li>
            <a
              class="menu-item"
              routerLinkActive="active"
              routerLink="/admin/orders"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-shopping-bag"></i>
                <!-- Orders icon -->
              </span>
              <span>Orders</span>
            </a>
          </li>

          <li>
            <a
              class="menu-item"
              routerLinkActive="active"
              routerLink="/admin/category"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-th-list"></i>
              </span>
              <span>Manage Menu</span>
            </a>
          </li>

          <li>
            <a
              class="menu-item"
              routerLinkActive="active"
              routerLink="/admin/manage-products"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-box-open"></i>
              </span>
              <span>Manage Products</span>
            </a>
          </li>

          <li>
            <a
              class="menu-item"
              routerLinkActive="active"
              routerLink="/admin/manage-brands"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-building"></i>
              </span>
              <span>Manage Brands</span>
            </a>
          </li>

          <li>
            <a
              class="menu-item"
              routerLinkActive="active"
              routerLink="/admin/customer-review"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-comments"></i>
                <!-- Customer Review icon -->
              </span>
              <span>Customer Review</span>
            </a>
          </li>
          <li class="section-title">OTHERS</li>
        <li class="relative">
          <button
            (click)="toggleSettingsDropdown()"
            class="menu-item w-full flex items-center justify-between"
          >
            <span class="flex items-center gap-3">
              <span class="icon-bg">
                <i class="fas fa-cog"></i>
              </span>
              <span>Settings</span>
            </span>
            <i class="fas fa-chevron-down text-sm"></i>
          </button>

          <!-- Dropdown -->
          <ul
            *ngIf="isSettingsDropdownOpen"
            class="absolute left-0 mt-1 w-full bg-white border dark:bg-[#292929] duration-300 transition-colors border-gray-200 rounded-lg shadow-lg z-50"
          >
            <li>
              <button
                class="w-full text-left px-4 py-2 dark:hover:text-black dark:text-white duration-300 transition-colors hover:bg-gray-100 text-[#160E4B] font-medium"
                routerLink="/admin/user-role"
              >
                <span class="icon-bg">
                  <i class="fas fa-user mr-2"></i>
                </span>
                <span>Accounts</span>
              </button>
            </li>
             <li>
                           <div
              class=" flex items-center justify-between py-2 text-sm rounded-xl hover:bg-gray-100 dark:hover:bg-white  dark:text-white transition-colors duration-300 cursor-pointer"
              role="menuitem"
              (click)="toggleTheme()"
            >
              <span class="flex items-center icon-bg">
                      <label class="themeToggle st-sunMoonThemeToggleBtn">
                <input
                  type="checkbox"
                  class="themeToggleInput"
                  (click)="$event.stopPropagation()"
                  [checked]="isdarkmode"
                />
                <span class="customCheckbox">
                  <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor" stroke="none">
                    <g>
                      <circle class="sunRay sunRay1" cx="18" cy="10" r="1.5" />
                      <circle class="sunRay sunRay2" cx="14" cy="16.928" r="1.5" />
                      <circle class="sunRay sunRay3" cx="6" cy="16.928" r="1.5" />
                      <circle class="sunRay sunRay4" cx="2" cy="10" r="1.5" />
                      <circle class="sunRay sunRay5" cx="6" cy="3.1718" r="1.5" />
                      <circle class="sunRay sunRay6" cx="14" cy="3.1718" r="1.5" />
                    </g>
                    <mask id="moon-mask">
                      <rect x="0" y="0" width="20" height="20" fill="white" />
                      <circle cx="11" cy="3" r="8" fill="black" />
                    </mask>
                    <circle class="sunMoon" cx="10" cy="10" r="8" mask="url(#moon-mask)" />
                  </svg>
                </span>
              </label>
                             <h2 class="ml-5 text-gray-400">Change Mood</h2>

              </span>
            </div>
            </li>
            <li>
              <button
                class="w-full text-left px-4 py-2  hover:bg-red-100 text-red-600 font-semibold"
                (click)="logout()"
              >
                <i class="fas fa-sign-out-alt mr-2"></i>
                Logout
              </button>
            </li>
          </ul>
        </li>
        </ng-container>

        <!-- Seller Menu -->
        <ng-container *ngIf="isSeller">
          <li class="section-title">MENU</li>
          <li>
            <a
              class="menu-item active"
              routerLinkActive="active"
              routerLink="/seller/dashboard"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-chart-line"></i>
                <!-- Dashboard icon -->
              </span>
              <span>Dashboard</span>
            </a>
          </li>

          <li>
            <a
              class="menu-item"
              routerLinkActive="active"
              routerLink="/seller/orders"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-shopping-bag"></i>
                <!-- Orders icon -->
              </span>
              <span>Orders</span>
            </a>
          </li>
          <li>
            <a
              class="menu-item"
              routerLinkActive="active"
              routerLink="/seller/manage-products"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-box-open"></i>
              </span>
              <span>Manage Products</span>
            </a>
          </li>

          <li>
            <a
              class="menu-item"
              routerLinkActive="active"
              routerLink="/seller/manage-brands"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-building"></i>
              </span>
              <span>Manage Brands</span>
            </a>
          </li>

          <li>
            <a
              class="menu-item"
              routerLinkActive="active"
              routerLink="/seller/customer-review"
            >
              <span class="icon-bg custom-icon">
                <i class="fas fa-comments"></i>
                <!-- Customer Review icon -->
              </span>
              <span>Customer Review</span>
            </a>
          </li>
          <li class="section-title">OTHERS</li>
          <li class="relative">
            <button
              (click)="toggleSettingsDropdown()"
              class="menu-item w-full flex items-center justify-between"
            >
              <span class="flex items-center gap-3">
                <span class="icon-bg">
                  <i class="fas fa-cog"></i>
                </span>
                <span>Settings</span>
              </span>
              <i class="fas fa-chevron-down text-sm"></i>
            </button>
           
  
            <!-- Dropdown -->
            <ul
              *ngIf="isSettingsDropdownOpen"
              class="absolute left-0 mt-1 w-full bg-white border border-gray-200 rounded-lg shadow-lg z-50"
            >
              <li>
                <button
                  class="w-full text-left px-4 py-2 hover:bg-red-100 text-red-600 font-semibold"
                  (click)="logout()"
                >
                  <i class="fas fa-sign-out-alt mr-2"></i>
                  Logout
                </button>
              </li>
            </ul>
        </ng-container>
      </ul>
    </div>
  </aside>
</div>
