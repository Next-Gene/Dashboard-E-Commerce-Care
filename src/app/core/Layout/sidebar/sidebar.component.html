<div class="flex h-screen bg-gray-100">
  <!-- Sidebar -->
  <aside class="fixed top-0 left-0 z-40 w-64 h-screen transition-transform -translate-x-full sm:translate-x-0"
    aria-label="Sidebar">
    <div class="h-full px-3 py-4 overflow-y-auto bg-white border-r border-gray-200">
      <!-- Logo -->
      <div class="flex items-center justify-center mb-4 cursor-pointer" routerLink="/">
        <img src="/prime care.png" alt="Logo" class="h-16" />
      </div>

      <!-- User Profile -->
      <div class="flex items-center mb-6 p-2 rounded-lg bg-gray-50">
        <div class="flex-shrink-0">
          <i class="fa-solid fa-circle-user text-3xl"></i>
        </div>
        <div class="flex-1 min-w-0 ms-4">
          <p class="text-sm font-medium text-gray-900 truncate">
            {{ userName }}
          </p>
        </div>
      </div>

      <!-- Navigation -->
      <ul class="menu-list">
        <!-- Admin Menu -->
        <ng-container *ngIf="isAdmin">
          <li class="section-title">MENU</li>

          <li>
            <a class="menu-item active" routerLinkActive="active" routerLink="/admin/dashboard">
              <span class="icon-bg">
                <img src="/Chart.png" alt="dashboard" class="w-5 h-5" />
              </span>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a class="menu-item" routerLinkActive="active" routerLink="/admin/orders">
              <span class="icon-bg">
                <img src="/Buy.png" alt="orders" class="w-5 h-5" />
              </span>
              <span>Orders</span>
            </a>
          </li>
          <li>
            <a class="menu-item" routerLinkActive="active" routerLink="/admin/category">
              <span class="icon-bg">
                <img src="/Document.png" alt="menu" class="w-5 h-5" />
              </span>
              <span>Manage Menu</span>
            </a>
          </li>
          <li>
            <a class="menu-item" routerLinkActive="active" routerLink="/admin/manage-products">
              <span class="icon-bg">
                <i class="fas fa-box-open "></i>
              </span>
              <span>Manage Products</span>
            </a>
          </li>
          <li>
            <a class="menu-item" routerLinkActive="active" routerLink="/admin/customer-review">
              <span class="icon-bg">
                <img src="/Chat.png" alt="review" class="w-5 h-5" />
              </span>
              <span>Customer Review</span>
            </a>
          </li>
        </ng-container>

        <!-- Seller Menu -->
        <ng-container *ngIf="isSeller">
          <li class="section-title">MENU</li>

          <li>
            <a class="menu-item active" routerLinkActive="active" routerLink="/seller/dashboard">
              <span class="icon-bg">
                <i class="fas fa-chart-bar"></i>
              </span>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a class="menu-item" routerLinkActive="active" routerLink="/seller/orders">
              <span class="icon-bg">
                <i class="fas fa-shopping-cart"></i>
              </span>
              <span>Orders</span>
            </a>
          </li>
          <li>
            <a class="menu-item" routerLinkActive="active" routerLink="/seller/manage-products">
              <span class="icon-bg">
                <i class="fas fa-box-open"></i>
              </span>
              <span>Manage Products</span>
            </a>
          </li>
          <li>
            <a class="menu-item" routerLinkActive="active" routerLink="/seller/customer-review">
              <span class="icon-bg">
                <i class="fas fa-comments"></i>
              </span>
              <span>Customer Review</span>
            </a>
          </li>
        </ng-container>

        <!-- Common Menu Items -->
        <li class="section-title">OTHERS</li>
        <li>
          <a class="menu-item" href="#">
            <span class="icon-bg">
              <i class="fas fa-cog"></i>
            </span>
            <span>Settings</span>
          </a>
        </li>
        <li>
          <a class="menu-item" href="#">
            <span class="icon-bg">
              <i class="fas fa-credit-card"></i>
            </span>
            <span>Payment</span>
          </a>
        </li>
        <li>
          <a class="menu-item" href="#">
            <span class="icon-bg">
              <i class="fas fa-user"></i>
            </span>
            <span>Accounts</span>
          </a>
        </li>
        <li>
          <a class="menu-item" href="#">
            <span class="icon-bg">
              <i class="fas fa-info-circle"></i>
            </span>
            <span>Help</span>
          </a>
        </li>
      </ul>
    </div>
  </aside>
</div>
