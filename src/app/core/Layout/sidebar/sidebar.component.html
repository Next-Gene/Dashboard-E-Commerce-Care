<div class="flex h-screen dark:bg-[#292929] transition-colors duration-300 bg-gray-100">
  <!-- Sidebar -->
  <aside class="fixed top-0 dark:bg-[#292929]  duration-300 left-0 z-40 w-64 h-screen transition-all -translate-x-full sm:translate-x-0"
    aria-label="Sidebar">
    <div class="h-full px-3 dark:bg-[#292929] transition-colors duration-300 py-4 overflow-y-auto bg-white border-r border-gray-200">
      <!-- Logo -->
      <div class="flex items-center justify-center mb-4 cursor-pointer" routerLink="/">
        <img src="/prime care.png" alt="Logo" class="h-16" />
      </div>

      <!-- User Profile -->
      <div class="flex items-center mb-6 transition-colors duration-300 dark:bg-[#292929] p-2 rounded-lg bg-gray-50">
        <div class="flex-shrink-0">
          <i class="fa-solid fa-circle-user text-3xl transition-colors duration-300 dark:text-slate-500"></i>
        </div>
        <div class="flex-1 min-w-0 ms-4 ">
          <p class="text-sm font-medium transition-colors duration-300 dark:text-white text-gray-900 truncate">
            {{ userName }}
          </p>
        </div>
      </div>

      <!-- Navigation -->
      <ul class="menu-list dark:text-white duration-300 transition-colors dark:bg-[#292929]">
        <!-- Admin Menu -->
        <ng-container *ngIf="isAdmin">
          <li class="  section-title">MENU</li>

          <li>
            <a class="menu-item active" routerLinkActive="active" routerLink="/admin/dashboard">
              <span class="icon-bg">
                <img src="/Chart.png" alt="dashboard" class="w-5 h-5" />
              </span>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a class="menu-item" routerLinkActive="active" routerLink="/admin/orders">
              <span class="icon-bg">
                <img src="/Buy.png" alt="orders" class="w-5 h-5" />
              </span>
              <span>Orders</span>
            </a>
          </li>
          <li>
            <a class="menu-item" routerLinkActive="active" routerLink="/admin/category">
              <span class="icon-bg">
                <img src="/Document.png" alt="menu" class="w-5 h-5" />
              </span>
              <span>Manage Menu</span>
            </a>
          </li>
          <li>
            <a class="menu-item" routerLinkActive="active" routerLink="/admin/manage-products">
              <span class="icon-bg">
                <i class="fas fa-box-open "></i>
              </span>
              <span>Manage Products</span>
            </a>
          </li>
          <li>
            <a class="menu-item" routerLinkActive="active" routerLink="/admin/manage-brands">
              <span class="icon-bg">
                <i class="fas fa-box-open "></i>
              </span>
              <span>Manage Brands</span>
            </a>
          </li>
          <li>
            <a class="menu-item" routerLinkActive="active" routerLink="/admin/customer-review">
              <span class="icon-bg">
                <img src="/Chat.png" alt="review" class="w-5 h-5" />
              </span>
              <span>Customer Review</span>
            </a>
          </li>
        </ng-container>

        <!-- Seller Menu -->
        <ng-container *ngIf="isSeller">
          <li class="section-title">MENU</li>

          <li>
            <a class="menu-item active" routerLinkActive="active" routerLink="/seller/dashboard">
              <span class="icon-bg">
                <i class="fas fa-chart-bar"></i>
              </span>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a class="menu-item" routerLinkActive="active" routerLink="/seller/orders">
              <span class="icon-bg">
                <i class="fas fa-shopping-cart"></i>
              </span>
              <span>Orders</span>
            </a>
          </li>
          <li>
            <a class="menu-item" routerLinkActive="active" routerLink="/seller/manage-products">
              <span class="icon-bg">
                <i class="fas fa-box-open"></i>
              </span>
              <span>Manage Products</span>
            </a>
          </li>
          <li>
            <a class="menu-item" routerLinkActive="active" routerLink="/seller/customer-review">
              <span class="icon-bg">
                <i class="fas fa-comments"></i>
              </span>
              <span>Customer Review</span>
            </a>
          </li>
        </ng-container>

        <!-- Common Menu Items -->
        <li class="section-title">OTHERS</li>
        <li>
          <a class="menu-item" href="#">
            <span class="icon-bg">
              <i class="fas fa-cog"></i>
            </span>
            <span>Settings</span>
          </a>
        </li>
        <li>
          <a class="menu-item" href="#">
            <span class="icon-bg">
              <i class="fas fa-credit-card"></i>
            </span>
            <span>Payment</span>
          </a>
        </li>
        <li>
          <a class="menu-item" href="#">
            <span class="icon-bg">
              <i class="fas fa-user"></i>
            </span>
            <span>Accounts</span>
          </a>
        </li>
        <li>
          <a class="menu-item" href="#">
            <span class="icon-bg">
              <i class="fas fa-info-circle"></i>
            </span>
            <span>Help</span>
          </a>
        </li>
         <li>
             <div
              class=" flex items-center justify-between px-2.5 py-2 text-sm rounded-xl hover:bg-gray-100 dark:hover:bg-white  dark:text-white transition-colors duration-300 cursor-pointer"
              role="menuitem"
              (click)="toggleTheme()"
            >
              <span class="flex items-center icon-bg">
                      <label class="themeToggle st-sunMoonThemeToggleBtn">
                <input
                  type="checkbox"
                  class="themeToggleInput"
                  (click)="$event.stopPropagation()"
                  [checked]="isdarkmode"
                />
                <span class="customCheckbox">
                  <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor" stroke="none">
                    <g>
                      <circle class="sunRay sunRay1" cx="18" cy="10" r="1.5" />
                      <circle class="sunRay sunRay2" cx="14" cy="16.928" r="1.5" />
                      <circle class="sunRay sunRay3" cx="6" cy="16.928" r="1.5" />
                      <circle class="sunRay sunRay4" cx="2" cy="10" r="1.5" />
                      <circle class="sunRay sunRay5" cx="6" cy="3.1718" r="1.5" />
                      <circle class="sunRay sunRay6" cx="14" cy="3.1718" r="1.5" />
                    </g>
                    <mask id="moon-mask">
                      <rect x="0" y="0" width="20" height="20" fill="white" />
                      <circle cx="11" cy="3" r="8" fill="black" />
                    </mask>
                    <circle class="sunMoon" cx="10" cy="10" r="8" mask="url(#moon-mask)" />
                  </svg>
                </span>
              </label>
                             <h2 class="ml-5 text-gray-400">Change Mood</h2>

              </span>
            </div>
        </li>
      </ul>
    </div>
  </aside>
  
</div>
