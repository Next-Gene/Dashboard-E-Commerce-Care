<div class="min-h-screen w-full dark:bg-[#252525] transition-colors duration-300 bg-white flex flex-col items-center justify-center text-center">
  <!-- Error Image -->
  <img 
    src="Error-image.png" 
    alt="Error Image"
    class="max-w-xs mb-6"
  />
  <h1 class="text-4xl font-bold text-gray-800 mb-2">{{ errorCode }}</h1>
  <h2 class="text-xl font-semibold text-gray-700 mb-6">{{ errorMessage }}</h2>
  <div class="flex flex-col sm:flex-row gap-4">
    <button
      (click)="goBack()"
      class="inline-block bg-blue-500 text-white px-5 py-2 rounded-3xl hover:bg-blue-600 
             focus:outline-none focus:ring-2 focus:ring-blue-300 transition"
    >
      Go Back
    </button>

  </div>
</div>
