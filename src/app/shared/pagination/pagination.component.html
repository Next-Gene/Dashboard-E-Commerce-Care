<div class="flex flex-col sm:flex-row items-center justify-between gap-2 sm:gap-4 py-4 text-white">
  <!-- Page Numbers -->
  <div class="flex flex-wrap justify-center  gap-1 sm:gap-2 w-full order-first sm:order-none">
    @for (page of pages; track $index) {
<button
  *ngIf="page !== '...'; else dots"
  class="px-2 sm:px-4 py-1.5 sm:py-2 rounded-lg text-xs sm:text-sm font-medium border transition-all duration-200 min-w-[32px] sm:min-w-[40px]"
  [class.bg-blue-600]="page === currentPage"
  [class.text-white]="page === currentPage"
  [class.border-blue-600]="page === currentPage"
  [class.bg-white]="page !== currentPage"
  [class.text-black]="page !== currentPage"
  [class.border-gray-200]="page !== currentPage"
  [class.hover:bg-gray-100]="page !== currentPage"
  (click)="goToPage(page)"
>
  {{ page }}
</button>
      <ng-template #dots>
        <span class="px-2 sm:px-3 py-1.5 sm:py-2 text-gray-500 text-xs sm:text-sm">...</span>
      </ng-template>
    }
  </div>
</div>
